<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Paul Craddock, Yannick Miossec, Youcef Bouchekioua">
  <meta name="description" content="Interactive simulation for Path Integration in Complex Number Space">
  <meta name="copyright" content="2026 Craddock, Miossec, Bouchekioua">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Path Integration in Complex Number Space - Interactive Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // SVG icon components
    const Play = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
    );
    
    const Pause = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect>
      </svg>
    );
    
    const RotateCcw = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
      </svg>
    );
    
    const Maximize2 = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="15 3 21 3 21 9"></polyline>
        <polyline points="9 21 3 21 3 15"></polyline>
        <line x1="21" y1="3" x2="14" y2="10"></line>
        <line x1="3" y1="21" x2="10" y2="14"></line>
      </svg>
    );
    
    const Download = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
    );

    const ComplexTrajectorySimulator = () => {
      const [numTrials, setNumTrials] = useState(20);
      const [speed, setSpeed] = useState(1);
      const [isRunning, setIsRunning] = useState(false);
      const [currentTrial, setCurrentTrial] = useState(0);
      const [trajectory, setTrajectory] = useState([]);
      const [currentZ, setCurrentZ] = useState({ re: 0, im: 0 });
      const [showAxes, setShowAxes] = useState(false);
      const [currentAxes, setCurrentAxes] = useState({ re: 0, im: 0 });
      const [isReturning, setIsReturning] = useState(false);
      const [returnPath, setReturnPath] = useState([]);
      const [currentReturnStep, setCurrentReturnStep] = useState(0);
      const [isFullscreen, setIsFullscreen] = useState(false);
      
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const animationRef = useRef(null);
      const timeoutRef = useRef(null);

      const initSimulation = () => {
        setCurrentTrial(0);
        setTrajectory([{ x: 0, y: 0, I: { re: 1, im: 0 } }]);
        setCurrentZ({ re: 0, im: 0 });
        setIsRunning(false);
        setShowAxes(false);
        setIsReturning(false);
        setReturnPath([]);
        setCurrentReturnStep(0);
      };

      useEffect(() => {
        initSimulation();
      }, []);

      const complexMult = (a, b) => ({
        re: a.re * b.re - a.im * b.im,
        im: a.re * b.im + a.im * b.re
      });

      const runTrial = () => {
        if (currentTrial >= numTrials) {
          setIsRunning(false);
          return;
        }

        const prevPoint = trajectory[trajectory.length - 1];
        const z1 = { re: 1, im: 1 };
        const i_n = Math.random() < 0.5 ? { re: 0, im: 1 } : { re: 0, im: -1 };
        const newI = complexMult(prevPoint.I, i_n);

        let z_delta;
        if (i_n.im === 1) {
          // Turning left: 0.5 < a <= 1 and 0 < b <= 0.5
          z_delta = {
            re: 0.5 + Math.random() * 0.5,  // 0.5 to 1
            im: Math.random() * 0.5   // 0 to 0.5
          };
        } else {
          // Turning right: 0 < a <= 0.5 and 0.5 < b <= 1
          z_delta = {
            re: Math.random() * 0.5,  // 0 to 0.5
            im: 0.5 + Math.random() * 0.5    // 0.5 to 1
          };
        }

        const I_times_z1 = complexMult(newI, z1);
        const z_n = {
          re: I_times_z1.re + z_delta.re,
          im: I_times_z1.im + z_delta.im
        };

        const newPoint = {
          x: prevPoint.x + z_n.im,
          y: prevPoint.y + z_n.re,
          I: newI,
          z_delta: z_delta,
          z_n: z_n,
          prevX: prevPoint.x,
          prevY: prevPoint.y
        };

        setTrajectory(prev => [...prev, newPoint]);
        setCurrentZ(z_n);
        setCurrentAxes(z_n);
        setShowAxes(true);
        setCurrentTrial(prev => prev + 1);

        timeoutRef.current = setTimeout(() => {
          setShowAxes(false);
        }, 5000 / speed);
      };

      // Homing implementation based on manuscript equations
      // X = X - (X/(X+Y)) + epsilon
      // Y = Y - (Y/(X+Y)) + epsilon
      const calculateReturnPath = () => {
        if (trajectory.length < 2) return;

        const lastPoint = trajectory[trajectory.length - 1];
        const path = [];

        // Initialize X and Y from final position
        let X_n = lastPoint.x;
        let Y_n = lastPoint.y;

        let stepCount = 0;
        const maxSteps = 10000;

        while (stepCount < maxSteps) {
          // Check stopping condition: continue while (X + Y) >= 1
          const sum = X_n + Y_n;

          if (sum < 1) {
            break;
          }

          // Store current position before update
          const prevX = X_n;
          const prevY = Y_n;

          // Single environmental perturbation epsilon in [-0.5, +0.5] for each (X,Y) pair
          const epsilon = -0.5 + Math.random();

          // Calculate denominator = X + Y
          const denominator = prevX + prevY;

          // Homing equations:
          // X_{n'+1} = X_{n'} - (X_{n'}/(X_{n'}+Y_{n'})) + epsilon
          // Y_{n'+1} = Y_{n'} - (Y_{n'}/(X_{n'}+Y_{n'})) + epsilon
          if (Math.abs(denominator) > 0.001) {
            X_n = prevX - (prevX / denominator) + epsilon;
            Y_n = prevY - (prevY / denominator) + epsilon;
          } else {
            // If denominator is near 0, stop
            break;
          }

          path.push({ x: X_n, y: Y_n });
          stepCount++;

          // Safety check to prevent infinite loops
          if (stepCount >= maxSteps - 1) {
            break;
          }
        }

        // Always add final point at home (0, 0)
        path.push({ x: 0, y: 0 });

        setReturnPath(path);
      };

      const animateReturnStep = () => {
        setCurrentReturnStep(prev => prev + 1);
      };

      useEffect(() => {
        if (isRunning && currentTrial < numTrials) {
          animationRef.current = setTimeout(() => {
            runTrial();
          }, 5000 / speed);
        } else if (currentTrial >= numTrials && !isReturning) {
          setIsReturning(true);
          calculateReturnPath();
        } else if (isReturning && isRunning && currentReturnStep < returnPath.length) {
          animationRef.current = setTimeout(() => {
            animateReturnStep();
          }, 5000 / speed);
        } else if (isReturning && isRunning && currentReturnStep >= returnPath.length) {
          // Homing complete - stop the simulation
          setIsRunning(false);
        }

        return () => {
          if (animationRef.current) clearTimeout(animationRef.current);
          if (timeoutRef.current) clearTimeout(timeoutRef.current);
        };
      }, [isRunning, currentTrial, speed, numTrials, isReturning, currentReturnStep, returnPath]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, width, height);

        let minX = 0, maxX = 0, minY = 0, maxY = 0;
        trajectory.forEach(point => {
          minX = Math.min(minX, point.x);
          maxX = Math.max(maxX, point.x);
          minY = Math.min(minY, point.y);
          maxY = Math.max(maxY, point.y);
        });

        const padding = 50;
        const rangeX = Math.max(maxX - minX, 5);
        const rangeY = Math.max(maxY - minY, 5);
        const scale = Math.min((width - 2 * padding) / rangeX, (height - 2 * padding) / rangeY);

        const centerX = width / 2;
        const centerY = height / 2;
        const offsetX = (minX + maxX) / 2;
        const offsetY = (minY + maxY) / 2;

        const toScreenX = (x) => centerX + (x - offsetX) * scale;
        const toScreenY = (y) => centerY - (y - offsetY) * scale;

        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1;
        for (let i = -20; i <= 20; i++) {
          ctx.beginPath();
          ctx.moveTo(toScreenX(i), 0);
          ctx.lineTo(toScreenX(i), height);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, toScreenY(i));
          ctx.lineTo(width, toScreenY(i));
          ctx.stroke();
        }

        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(toScreenX(0), 0);
        ctx.lineTo(toScreenX(0), height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, toScreenY(0));
        ctx.lineTo(width, toScreenY(0));
        ctx.stroke();

        if (trajectory.length > 1) {
          ctx.strokeStyle = '#3b82f6';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(toScreenX(trajectory[0].x), toScreenY(trajectory[0].y));

          for (let i = 1; i < trajectory.length; i++) {
            ctx.lineTo(toScreenX(trajectory[i].x), toScreenY(trajectory[i].y));
          }
          ctx.stroke();

          trajectory.forEach((point, i) => {
            ctx.fillStyle = i === trajectory.length - 1 ? '#ef4444' : '#3b82f6';
            ctx.beginPath();
            ctx.arc(toScreenX(point.x), toScreenY(point.y), i === trajectory.length - 1 ? 6 : 4, 0, 2 * Math.PI);
            ctx.fill();
          });
        }

        if (returnPath.length > 0) {
          const lastTrajectoryPoint = trajectory[trajectory.length - 1];
          ctx.strokeStyle = '#ec4899';
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.moveTo(toScreenX(lastTrajectoryPoint.x), toScreenY(lastTrajectoryPoint.y));

          const stepsToShow = Math.min(currentReturnStep, returnPath.length);
          for (let i = 0; i < stepsToShow; i++) {
            ctx.lineTo(toScreenX(returnPath[i].x), toScreenY(returnPath[i].y));
          }
          ctx.stroke();
          ctx.setLineDash([]);

          for (let i = 0; i < stepsToShow; i++) {
            ctx.fillStyle = i === stepsToShow - 1 ? '#a855f7' : '#ec4899';
            ctx.beginPath();
            ctx.arc(toScreenX(returnPath[i].x), toScreenY(returnPath[i].y), i === stepsToShow - 1 ? 6 : 3, 0, 2 * Math.PI);
            ctx.fill();
          }
        }

        if (trajectory.length > 1) {
          const shouldShowFrame = showAxes;
          if (shouldShowFrame) {
            const lastPoint = trajectory[trajectory.length - 1];
            const prevPoint = trajectory[trajectory.length - 2];

            const localOriginX = toScreenX(prevPoint.x);
            const localOriginY = toScreenY(prevPoint.y);

            ctx.strokeStyle = '#f59e0b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(localOriginX, localOriginY);
            ctx.lineTo(toScreenX(prevPoint.x + currentAxes.im), localOriginY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(localOriginX, localOriginY);
            ctx.lineTo(localOriginX, toScreenY(prevPoint.y + currentAxes.re));
            ctx.stroke();

            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(localOriginX, localOriginY);
            const resultant_end_x = toScreenX(prevPoint.x + lastPoint.z_n.im);
            const resultant_end_y = toScreenY(prevPoint.y + lastPoint.z_n.re);
            ctx.lineTo(resultant_end_x, resultant_end_y);
            ctx.stroke();

            const dx_screen = resultant_end_x - localOriginX;
            const dy_screen = resultant_end_y - localOriginY;
            const angle = Math.atan2(dy_screen, dx_screen);
            const headlen = 15;

            ctx.beginPath();
            ctx.moveTo(resultant_end_x, resultant_end_y);
            ctx.lineTo(resultant_end_x - headlen * Math.cos(angle - Math.PI / 6), resultant_end_y - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(resultant_end_x, resultant_end_y);
            ctx.lineTo(resultant_end_x - headlen * Math.cos(angle + Math.PI / 6), resultant_end_y - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
          }
        }
      }, [trajectory, showAxes, currentAxes, returnPath, currentReturnStep, isReturning]);

      const toggleFullscreen = async () => {
        try {
          if (!document.fullscreenElement) {
            await containerRef.current?.requestFullscreen();
            setIsFullscreen(true);
          } else {
            await document.exitFullscreen();
            setIsFullscreen(false);
          }
        } catch (err) {
          console.error('Fullscreen error:', err);
        }
      };

      useEffect(() => {
        const handleFullscreenChange = () => {
          setIsFullscreen(!!document.fullscreenElement);
        };
        
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      const handlePlayPause = () => {
        if (currentTrial >= numTrials && !isReturning) {
          initSimulation();
          setIsRunning(true);
        } else if (isReturning && currentReturnStep >= returnPath.length) {
          initSimulation();
          setIsRunning(true);
        } else {
          setIsRunning(!isRunning);
        }
      };

      // Determine if simulation is complete
      const isSimulationComplete = isReturning && returnPath.length > 0 && currentReturnStep >= returnPath.length;

      const exportToExcel = async () => {
        try {
          if (!window.XLSX) {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            await new Promise((resolve, reject) => {
              script.onload = () => resolve();
              script.onerror = () => reject(new Error('Failed to load XLSX library'));
              document.head.appendChild(script);
            });
          }

          const XLSX = window.XLSX;
          if (!XLSX) throw new Error('XLSX library not available');

          const outwardData = trajectory.slice(1).map((point, index) => ({
            'Step Type': 'Outward',
            'n (Sequence)': index + 1,
            "n' (Return Step)": '',
            'z_n (Real)': point.z_n ? parseFloat(point.z_n.re.toFixed(6)) : '',
            'z_n (Imaginary)': point.z_n ? parseFloat(point.z_n.im.toFixed(6)) : '',
            'X (Global)': parseFloat(point.x.toFixed(6)),
            'Y (Global)': parseFloat(point.y.toFixed(6)),
            'I (Real)': parseFloat(point.I.re.toFixed(6)),
            'I (Imaginary)': parseFloat(point.I.im.toFixed(6))
          }));

          const returnData = returnPath.map((point, index) => ({
            'Step Type': 'Return',
            'n (Sequence)': '',
            "n' (Return Step)": index + 1,
            'z_n (Real)': '',
            'z_n (Imaginary)': '',
            'X (Global)': parseFloat(point.x.toFixed(6)),
            'Y (Global)': parseFloat(point.y.toFixed(6)),
            'I (Real)': '',
            'I (Imaginary)': ''
          }));

          const allData = [...outwardData, ...returnData];
          const ws = XLSX.utils.json_to_sheet(allData);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, 'Trajectory Data');

          const timestamp = new Date().toISOString().replace(/[:. ]/g, '-').slice(0, -5);
          const filename = `trajectory_data_${timestamp}.xlsx`;

          XLSX.writeFile(wb, filename, { bookType: 'xlsx' });
        } catch (error) {
          console.error('Export error:', error);
          alert('Failed to export to Excel format.');
        }
      };

      return (
        <div ref={containerRef} className="w-full h-screen bg-slate-900 flex flex-col">
          <div className="bg-slate-800 border-b border-slate-700 p-4">
            <h1 className="text-2xl font-bold text-white mb-4">Complex Trajectory Simulator</h1>
            
            <div className="flex flex-wrap gap-4 items-center">
              <div className="flex gap-2">
                <button onClick={handlePlayPause} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded flex items-center gap-2">
                  {isRunning ? <Pause size={20} /> : <Play size={20} />}
                  {isSimulationComplete ? 'Restart' : (isRunning ? 'Pause' : 'Play')}
                </button>
                
                <button onClick={initSimulation} className="bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded flex items-center gap-2">
                  <RotateCcw size={20} />
                  Reset
                </button>
                
                <button onClick={toggleFullscreen} className="bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded flex items-center gap-2">
                  <Maximize2 size={20} />
                  Fullscreen
                </button>
                
                <button onClick={exportToExcel} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled={trajectory.length <= 1}>
                  <Download size={20} />
                  Export to Excel
                </button>
              </div>
              
              <div className="flex items-center gap-2">
                <label className="text-white">Sequence of Steps:</label>
                <input type="number" value={numTrials} onChange={(e) => setNumTrials(Math.max(1, parseInt(e.target.value) || 1))} className="bg-slate-700 text-white px-3 py-2 rounded w-20" min="1" max="10000" />
              </div>
              
              <div className="flex items-center gap-2">
                <label className="text-white">Speed: {speed}x</label>
                <input type="range" value={speed} onChange={(e) => setSpeed(parseFloat(e.target.value))} className="w-32" min="0.1" max="50" step="0.1" />
              </div>
              
              <div className="text-white">
                Sequence of Steps: {currentTrial} / {numTrials}
                {isReturning && (
                  <span className="ml-2">| Return: {currentReturnStep}/{returnPath.length}</span>
                )}
              </div>
            </div>
          </div>

          <div className="flex-1 relative">
            <canvas ref={canvasRef} width={1200} height={800} className="w-full h-full" />
            
            {trajectory.length > 1 && (
              <div className="absolute top-4 left-4 bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded p-4 text-white text-sm">
                <div className="font-semibold mb-3 text-base">Current Sequence of Steps</div>
                <div className="space-y-2">
                  {!isReturning ? (
                    <>
                      <div>
                        <div className="text-slate-400 text-xs mb-1">z<sub>local</sub> (current step):</div>
                        <div className="font-mono text-green-400">{currentZ.re.toFixed(3)} {currentZ.im >= 0 ? '+' : ''} {currentZ.im.toFixed(3)}i</div>
                      </div>
                      
                      <div className="border-t border-slate-700/50 pt-2">
                        <div className="text-slate-400 text-xs mb-1">z<sub>global</sub> (position):</div>
                        <div className="font-mono text-blue-400">x: {trajectory[trajectory.length - 1].x.toFixed(3)}<br/>y: {trajectory[trajectory.length - 1].y.toFixed(3)}</div>
                      </div>
                      
                      <div className="border-t border-slate-700/50 pt-2 text-xs text-slate-400">Step {currentTrial} of {numTrials}</div>
                    </>
                  ) : (
                    <>
                      <div>
                        <div className="text-pink-400 text-xs mb-1 font-semibold">Return Path Position:</div>
                        {currentReturnStep > 0 && currentReturnStep <= returnPath.length ? (
                          <div className="font-mono text-pink-400">
                            X: {returnPath[currentReturnStep - 1].x.toFixed(3)}<br/>
                            Y: {returnPath[currentReturnStep - 1].y.toFixed(3)}
                          </div>
                        ) : (
                          <div className="font-mono text-pink-400">Complete</div>
                        )}
                      </div>
                      
                      <div className="border-t border-slate-700/50 pt-2 text-xs text-slate-400">
                        Step: {currentReturnStep} / {returnPath.length}
                      </div>
                    </>
                  )}
                </div>
              </div>
            )}

            <div className="absolute top-4 left-4 bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded p-3 text-white text-xs max-w-xs" style={{marginTop: trajectory.length > 1 ? '240px' : '0'}}>
              <div className="font-semibold mb-1.5 text-sm">Legend</div>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-4 h-0.5 bg-blue-500"></div>
                <span className="text-xs">Blue: Main trajectory</span>
              </div>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-4 h-0.5 bg-pink-500" style={{backgroundImage: 'repeating-linear-gradient(90deg, #ec4899 0, #ec4899 5px, transparent 5px, transparent 10px)'}}></div>
                <span className="text-xs">Pink: Homing (proportional inhibition)</span>
              </div>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-4 h-0.5 bg-green-500"></div>
                <span className="text-xs">Green: Resultant vector</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-4 h-0.5 bg-orange-500"></div>
                <span className="text-xs">Orange: Local axes</span>
              </div>
            </div>
          </div>

          <div className="bg-slate-800 border-t border-slate-700 p-4">
            <div className="text-white flex gap-6">
              <div className="font-semibold text-slate-400 text-sm mb-1">Outward Journey:</div>
            </div>
            <div className="text-white flex gap-6">
              <div>
                <span className="font-semibold">Current z<sub>n</sub>:</span>{' '}
                <span className="font-mono">
                  {currentZ.re.toFixed(3)} {currentZ.im >= 0 ? '+' : ''} {currentZ.im.toFixed(3)}i
                </span>
              </div>
              {trajectory.length > 1 && (
                <div>
                  <span className="font-semibold">Final Position:</span>{' '}
                  <span className="font-mono">
                    ({trajectory[trajectory.length - 1].x.toFixed(3)}, {trajectory[trajectory.length - 1].y.toFixed(3)})
                  </span>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<ComplexTrajectorySimulator />, document.getElementById('root'));
